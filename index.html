<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newman University - IT Survival Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        
        /* Newman Colors */
        .text-newman-navy { color: #002D62; }
        .bg-newman-navy { background-color: #002D62; }
        .text-newman-blue { color: #4B9CD3; }
        .bg-newman-blue { background-color: #4B9CD3; }

        /* THE IT GEEK (You) - CSS ART */
        .character-container {
            position: relative; width: 200px; height: 220px; margin: 0 auto;
        }
        .geek-body {
            width: 120px; height: 110px; background-color: #f8fafc; border: 4px solid #1e293b;
            border-radius: 40px 40px 10px 10px; position: absolute; bottom: 0; left: 40px; z-index: 2;
        }
        .geek-tie {
            width: 16px; height: 90px; background-color: #b91c1c; position: absolute; top: 5px; left: 52px;
            clip-path: polygon(20% 0, 80% 0, 100% 80%, 50% 100%, 0 80%); border: 2px solid #7f1d1d;
        }
        .pocket-protector {
            width: 25px; height: 30px; background-color: #e2e8f0; border: 2px solid #1e293b;
            position: absolute; top: 30px; left: 80px; border-radius: 0 0 5px 5px;
        }
        .pen-1 { width: 4px; height: 15px; background: #0ea5e9; position: absolute; top: -10px; left: 4px; }
        .pen-2 { width: 4px; height: 12px; background: #ef4444; position: absolute; top: -8px; left: 12px; }

        .geek-head {
            width: 100px; height: 110px; background-color: #fcd5ce; border: 4px solid #1e293b;
            border-radius: 45%; position: absolute; top: 15px; left: 50px; z-index: 3; transition: all 0.3s;
        }
        .geek-hair {
            width: 110px; height: 40px; background-color: #334155; border-radius: 50px 50px 10px 10px;
            position: absolute; top: -10px; left: -5px; clip-path: polygon(0% 100%, 10% 20%, 30% 0%, 50% 15%, 70% 0%, 90% 20%, 100% 100%);
        }
        .geek-glasses { display: flex; width: 86px; position: absolute; top: 40px; left: 7px; z-index: 4; }
        .geek-lens { width: 38px; height: 32px; border: 5px solid #1e293b; border-radius: 5px; background: rgba(255, 255, 255, 0.8); position: relative; }
        .geek-bridge { width: 10px; height: 5px; background: #1e293b; margin-top: 15px; }
        .geek-tape { width: 8px; height: 16px; background: #cbd5e1; position: absolute; top: -5px; left: 1px; transform: rotate(15deg); }
        .geek-pupil { width: 8px; height: 8px; background: #1e293b; border-radius: 50%; position: absolute; top: 10px; left: 12px; transition: all 0.2s;}
        .geek-eyebrow-l, .geek-eyebrow-r { width: 30px; height: 6px; background: #334155; position: absolute; top: 30px; z-index: 5; transition: all 0.2s; }
        .geek-eyebrow-l { left: 10px; transform: rotate(-5deg); }
        .geek-eyebrow-r { right: 10px; transform: rotate(5deg); }
        .geek-mouth { width: 30px; height: 10px; border-bottom: 4px solid #1e293b; border-radius: 0 0 10px 10px; position: absolute; bottom: 15px; left: 35px; transition: all 0.2s; }

        .geek-arm-l, .geek-arm-r {
            width: 25px; height: 80px; background-color: #f8fafc; border: 4px solid #1e293b;
            border-radius: 12px; position: absolute; top: 110px; z-index: 4; transform-origin: top center; transition: all 0.3s;
        }
        .geek-arm-l { left: 25px; transform: rotate(15deg); }
        .geek-arm-r { right: 25px; transform: rotate(-15deg); }

        /* SCENARIO-SPECIFIC ANIMATIONS */
        @keyframes angry-wave { 0%, 100% { transform: rotate(120deg); } 50% { transform: rotate(160deg); } }
        .anim-angry-wave .geek-arm-l { animation: angry-wave 0.4s infinite alternate; left: 10px; top: 120px; }
        .anim-angry-wave .geek-arm-r { animation: angry-wave 0.4s infinite alternate-reverse; right: 10px; top: 120px; transform: rotate(-120deg); }
        .anim-angry-wave .geek-mouth { border-radius: 50%; height: 20px; background: #1e293b; }

        @keyframes eyebrow-wiggle { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(10deg); } }
        .anim-suspicious .geek-eyebrow-l { animation: eyebrow-wiggle 1s infinite; }
        .anim-suspicious .geek-mouth { width: 15px; border-radius: 50%; border-bottom: 0; border: 3px solid transparent; border-left: 3px solid #1e293b; left: 40px;}

        .anim-facepalm .geek-arm-l { transform: rotate(150deg) translateY(-20px) translateX(-20px); z-index: 6; }
        .anim-facepalm .geek-head { transform: rotate(-10deg) translateY(5px); }
        .anim-facepalm .geek-mouth { border-bottom: 0; border-top: 4px solid #1e293b; border-radius: 10px 10px 0 0; }

        @keyframes typing { 0%, 100% { transform: rotate(45deg) translateY(-10px); } 50% { transform: rotate(80deg) translateY(10px); } }
        .anim-typing .geek-arm-l { animation: typing 0.15s infinite alternate; }
        .anim-typing .geek-arm-r { animation: typing 0.15s infinite alternate-reverse; }

        @keyframes twitch { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5) translate(2px, -2px); } }
        .anim-twitch .geek-pupil { animation: twitch 0.2s infinite; }
        .anim-twitch .geek-eyebrow-l { transform: translateY(-10px) rotate(-15deg); }
        .anim-twitch .geek-eyebrow-r { transform: translateY(5px) rotate(10deg); }

        @keyframes deflate { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.9) translateY(10px); } }
        .anim-sigh .character-container { animation: deflate 3s infinite ease-in-out; }
        .anim-sigh .geek-mouth { border-radius: 50%; height: 15px; background: #555; }
        .anim-sigh .geek-arm-l { transform: rotate(5deg); }
        .anim-sigh .geek-arm-r { transform: rotate(-5deg); }

        .anim-smug .geek-eyebrow-l { transform: translateY(5px) rotate(5deg); }
        .anim-smug .geek-eyebrow-r { transform: translateY(-5px) rotate(-5deg); }
        .anim-smug .geek-mouth { width: 25px; transform: rotate(-15deg); border-left: 2px solid #1e293b; }

        @keyframes panic-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px) rotate(-2deg); } 75% { transform: translateX(4px) rotate(2deg); } }
        .anim-panic { animation: panic-shake 0.1s infinite; }
        .anim-panic .geek-mouth { height: 25px; border-radius: 5px; background: #1e293b; }
        .anim-panic .geek-pupil { transform: scale(0.5); }

        .anim-dead .geek-pupil { transform: scale(0.3); opacity: 0.5; }
        .anim-dead .geek-mouth { border-bottom: 2px solid #1e293b; border-radius: 0; }
        .anim-dead .geek-arm-l, .anim-dead .geek-arm-r { transform: rotate(0); }

        /* Glass Panel & Background */
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .bg-dynamic { background: linear-gradient(-45deg, #0a192f, #002D62, #1e293b, #0f172a); background-size: 400% 400%; animation: gradientBG 20s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .jet-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-15deg); width: 150vw; height: 150vh; opacity: 0.03; pointer-events: none; z-index: 0; fill: #ffffff; }

        /* Custom Interactive Elements */
        .tooltip-container { position: relative; display: inline-block; cursor: help; border-bottom: 2px dashed #4B9CD3; }
        .tooltip-container .tooltip-text { visibility: hidden; width: max-content; background-color: #1e293b; color: #fff; text-align: center; border-radius: 6px; padding: 5px 10px; position: absolute; z-index: 10; bottom: 125%; left: 50%; transform: translateX(-50%); opacity: 0; transition: opacity 0.3s; font-family: monospace; font-size: 0.8rem; }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }
        
        .answer-btn { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        .answer-btn:hover:not(:disabled) { border-color: #4B9CD3; background-color: #f0f9ff; transform: translateX(5px); }
        
        @keyframes ring-shake { 0%, 100% { transform: rotate(0); } 20% { transform: rotate(15deg); } 40% { transform: rotate(-15deg); } 60% { transform: rotate(10deg); } 80% { transform: rotate(-10deg); } }
        .ringing { animation: ring-shake 0.5s infinite; color: #ef4444; }
    </style>
</head>
<body class="bg-dynamic min-h-screen flex flex-col items-center justify-center p-4 font-sans overflow-x-hidden text-slate-800">

    <svg class="jet-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 5 C 50 5 55 25 55 45 L 90 65 L 90 75 L 55 65 L 50 95 L 45 65 L 10 75 L 10 65 L 45 45 C 45 25 50 5 50 5 Z" />
    </svg>

    <div id="app-container" class="glass-panel rounded-2xl shadow-2xl w-full max-w-5xl overflow-hidden relative z-10 border-t-8 border-newman-blue">
        
        <div class="bg-slate-900 text-white p-4 flex justify-between items-center px-6">
            <div>
                <h1 class="text-2xl font-black tracking-tight uppercase text-newman-blue" id="header-title">IT Survival Training</h1>
                <p class="text-slate-400 text-xs font-bold mt-1" id="header-subtitle">MANDATORY EDUCATION MODULE</p>
            </div>
            <div class="text-right" id="score-container" style="display:none;">
                <div class="text-[10px] text-slate-400 font-bold tracking-widest">WILL TO LIVE</div>
                <div id="score-display" class="text-2xl font-black text-emerald-400 font-mono text-shadow">100%</div>
            </div>
        </div>

        <div class="flex flex-col md:flex-row p-6 min-h-[550px]">
            <div class="w-full md:w-1/3 flex flex-col items-center justify-start border-b md:border-b-0 md:border-r border-slate-200 pb-6 md:pb-0 md:pr-6">
                <div id="character" class="character-container">
                    <div class="geek-arm-l"></div>
                    <div class="geek-arm-r"></div>
                    <div class="geek-body">
                        <div class="pocket-protector"><div class="pen-1"></div><div class="pen-2"></div></div>
                        <div class="geek-tie"></div>
                    </div>
                    <div class="geek-head">
                        <div class="geek-hair"></div>
                        <div class="geek-eyebrow-l"></div>
                        <div class="geek-eyebrow-r"></div>
                        <div class="geek-glasses">
                            <div class="geek-lens"><div class="geek-pupil"></div></div>
                            <div class="geek-bridge"><div class="geek-tape"></div></div>
                            <div class="geek-lens"><div class="geek-pupil"></div></div>
                        </div>
                        <div class="geek-mouth"></div>
                    </div>
                </div>
                
                <div class="mt-6 text-center bg-slate-50 p-4 rounded-xl shadow-inner border border-slate-200 w-full relative">
                    <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-[10px] font-bold px-3 py-1 rounded uppercase tracking-wider">
                        The IT Guy
                    </div>
                    <div id="geek-dialogue" class="text-sm font-semibold text-slate-700 mt-2 italic">
                        "Welcome. Please don't break anything. I haven't slept since 2019."
                    </div>
                    <button id="tts-btn" onclick="playPodcast()" class="hidden mt-3 w-full bg-indigo-100 hover:bg-indigo-200 text-indigo-700 text-xs font-bold py-2 px-3 rounded shadow-sm border border-indigo-200 transition flex items-center justify-center gap-2">
                        <span>🎧</span> Listen to Audio Rant
                    </button>
                </div>
            </div>

            <div id="content-area" class="w-full md:w-2/3 flex flex-col justify-center pl-0 md:pl-8 mt-6 md:mt-0">
                </div>
        </div>
    </div>

    <script>
        // --- DOM ELEMENTS (Assigned immediately) ---
        const contentArea = document.getElementById('content-area');
        const character = document.getElementById('character');
        const geekDialogue = document.getElementById('geek-dialogue');
        const scoreContainer = document.getElementById('score-container');
        const scoreDisplay = document.getElementById('score-display');
        const headerTitle = document.getElementById('header-title');
        const headerSubtitle = document.getElementById('header-subtitle');

        // --- STATE VARIABLES ---
        let currentState = 'intro';
        let currentLessonIndex = 0;
        let currentQuizStage = 0;
        let score = 100;

        // --- GEMINI API SETUP ---
        const apiKey = "AIzaSyAQOQf5q7TJNbLEOFf4YtLRvqcbRthomlA"; // <--- Put your active API Key here
        const TEXT_MODEL = "gemini-2.5-flash-preview-09-2025";
        const TEXT_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${apiKey}`;

        async function fetchWithRetry(url, options, retries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errData = await response.json().catch(() => ({}));
                        throw new Error(`HTTP error! status: ${response.status} - ${errData.error?.message || ''}`);
                    }
                    return await response.json();
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        function playPodcast() {
            const btn = document.getElementById('tts-btn');
            if (btn) btn.classList.add('opacity-50', 'cursor-not-allowed');

            let promptText = "";
            if (currentState === 'training') promptText = lessons[currentLessonIndex].audioPrompt;
            else if (currentState === 'quiz') promptText = "Stop clicking hints and answer the question, I have a server on fire.";

            promptText = promptText.replace(/Say in.*?voice:\s*/i, '');

            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(promptText);
                utterance.pitch = 0.7; 
                utterance.rate = 1.0;

                utterance.onstart = () => { if (character) character.classList.add('anim-angry-wave'); };
                utterance.onend = () => { 
                    if (character) character.classList.remove('anim-angry-wave'); 
                    if (btn) btn.classList.remove('opacity-50', 'cursor-not-allowed');
                };

                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        }
        
        async function begForHint() {
            const hintBtn = document.getElementById('hint-btn');
            const hintBox = document.getElementById('hint-box');
            const hintText = document.getElementById('hint-text');
            
            if (hintBtn) {
                hintBtn.disabled = true; 
                hintBtn.classList.add('opacity-50', 'cursor-not-allowed');
                hintBtn.innerHTML = "✨ Contacting the void...";
            }
            if (hintBox) hintBox.classList.remove('hidden');
            if (hintText) hintText.innerHTML = "<em>IT Guy is aggressively sighing and typing...</em>";
            
            setAnimation('anim-typing', "You interrupted my coffee break for THIS?");

            const scenario = scenarios[currentQuizStage];
            const systemPrompt = `You are an extremely cynical, edgy, overworked IT guy. A user is taking a cybersecurity test and is stuck on a scenario. Provide a 1-to-2 sentence sarcastic hint that playfully mocks them for needing help, gives a tiny clue to the right answer, but DOES NOT give the exact answer away. Keep it clean and safe for work.`;
            const userQuery = `Scenario: "${scenario.text}"`;

            const payload = { 
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchWithRetry(TEXT_API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                
                const hint = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!hint) throw new Error("AI response blocked or empty.");
                
                if (hintText) hintText.innerHTML = `<strong>IT Guy:</strong> ${hint}`;
                setAnimation('anim-sigh', "Read it slowly. Sound out the words if you have to.");
                if (hintBtn) hintBtn.innerHTML = "✨ Hint Deployed";
            } catch (e) {
                console.error("Hint Error:", e);
                if (hintText) hintText.innerHTML = "<em>Error: Network timeout or AI blocked. The IT Guy ignored your ticket.</em>";
                if (hintBtn) {
                    hintBtn.innerHTML = "✨ Beg for a Hint";
                    hintBtn.disabled = false; 
                    hintBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }
        }

        async function generateNightmare() {
            const genBtn = document.getElementById('gen-nightmare-btn');
            if (genBtn) {
                genBtn.disabled = true; 
                genBtn.classList.add('opacity-50', 'animate-pulse');
                genBtn.innerHTML = "✨ Concocting fresh horrors...";
            }
            
            setAnimation('anim-typing', "Hold on, I'm writing a custom nightmare specifically for you.");

            const systemPrompt = `You are a cynical, overworked IT professional writing a cybersecurity training exam. Generate ONE multiple-choice scenario. Make it edgy, funny, and sarcastic but completely safe for work. Keep it related to office/university IT security. Return valid JSON only.`;
            const userQuery = `Generate a new multiple-choice cybersecurity scenario.`;

            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            animationClass: { type: "STRING", description: "Choose one exactly: anim-angry-wave, anim-suspicious, anim-facepalm, anim-typing, anim-twitch, anim-sigh, anim-smug, anim-panic, anim-vengeance, anim-dead" },
                            dialogue: { type: "STRING" }, title: { type: "STRING" }, text: { type: "STRING" },
                            options: { type: "ARRAY", items: { type: "OBJECT", properties: { text: { type: "STRING" }, score: { type: "NUMBER" }, correct: { type: "BOOLEAN" }, feedback: { type: "STRING" } } } }
                        }
                    }
                }
            };

            try {
                 const result = await fetchWithRetry(TEXT_API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                 });
                 
                 const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                 if (!textResponse) throw new Error("AI response blocked or empty.");
                 
                 const newScenario = JSON.parse(textResponse);
                 newScenario.options.sort(() => Math.random() - 0.5);
                 scenarios.push(newScenario);
                 currentQuizStage = scenarios.length - 1; 
                 if (scoreContainer) scoreContainer.style.display = 'block'; 
                 renderQuizScenario();
            } catch(e) {
                console.error("Nightmare Error:", e);
                if (genBtn) {
                    genBtn.innerHTML = "✨ Failed. Try again.";
                    genBtn.disabled = false; 
                    genBtn.classList.remove('opacity-50', 'animate-pulse');
                }
                setAnimation('anim-angry-wave', "Great, you broke the AI too.");
            }
        }
        
        async function roastPerformance() {
            const roastBtn = document.getElementById('roast-btn');
            const roastBox = document.getElementById('roast-box');
            const roastText = document.getElementById('roast-text');
            
            if (roastBtn) {
                roastBtn.disabled = true;
                roastBtn.classList.add('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                roastBtn.innerHTML = "✨ Calculating your deserved level of IT sarcasm...";
            }
            
            if (roastBox) roastBox.classList.remove('hidden');
            if (roastText) roastText.innerHTML = "<em>IT Guy is aggressively sighing and preparing to destroy your self-esteem...</em>";
            
            setAnimation('anim-typing', "Oh, you want my honest opinion? Big mistake.");

            const systemPrompt = `You are a cynical, edgy, overworked IT guy. A user just finished their mandatory cybersecurity training. Write a 2-3 sentence sarcastic roast about their performance. 
            If they scored high (70-100%), accept it giving them a cute and witty compliment but playfully mock them for expecting a parade.
            If they failed (under 70%), playfully mock them and roast them for being a threat to the university network. 
            Keep it completely clean, professional, and safe for work.`;
            const userQuery = `User's final score: ${score}%`;

            const payload = { 
                contents: [{ parts: [{ text: userQuery }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchWithRetry(TEXT_API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                
                const roast = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!roast) throw new Error("AI response blocked or empty.");
                
                if (roastText) roastText.innerHTML = `<strong>IT Guy's Official Verdict:</strong> ${roast}`;
                if (score >= 70) setAnimation('anim-smug', "There. I gave you attention. Now close my ticket.");
                else setAnimation('anim-facepalm', "I'm printing this roast and putting it on the fridge in the server room and on every bulletin board in every building on campus.");
                
                if (roastBtn) {
                    roastBtn.innerHTML = "✨ Roasted";
                    roastBtn.classList.remove('animate-pulse');
                }
            } catch (e) {
                console.error("Roast Error:", e);
                if (roastText) roastText.innerHTML = "<em>Error: Network timeout or AI blocked. The IT Guy doesn't even have the energy to insult you right now.</em>";
                if (roastBtn) {
                    roastBtn.innerHTML = "✨ Roast My Performance";
                    roastBtn.disabled = false; 
                    roastBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'animate-pulse');
                }
            }
        }

        function setAnimation(animClass, dialogue) {
            if (character) {
                character.className = "character-container"; 
                void character.offsetWidth; // Reflow
                if (animClass) character.classList.add(animClass);
            }
            if (geekDialogue && dialogue) {
                geekDialogue.textContent = `"${dialogue}"`;
            }
        }

        function showTTSButton() { 
            const btn = document.getElementById('tts-btn');
            if (btn) btn.classList.remove('hidden'); 
        }
        
        function hideTTSButton() { 
            const btn = document.getElementById('tts-btn');
            if (btn) btn.classList.add('hidden'); 
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
            }
        }

        // --- PHASE 1: INTERACTIVE TRAINING ---
        const lessons = [
            {
                title: "Lesson 1: The 15-Character Minimum",
                anim: "anim-angry-wave",
                dialogue: "Eight characters? What is this, 2004? An 8-character password gets cracked before you even finish typing it. That is not an exaggeration for some of you - I've seen you poking the keys with your index fingers one pointy pokey key at a time.  We are moving from 8 to 15.",
                audioPrompt: "Say in an aggressive, edgy IT guy voice: Listen to me very carefully. An eight character password is a welcome mat for hackers. We are upgrading the university standard to fifteen characters immediately. Use a passphrase instead.",
                render: () => `
                    <div class="animate-fade-in">
                        <h2 class="text-2xl font-black text-slate-800 mb-4">Passphrases > Passwords</h2>
                        <p class="text-slate-600 mb-4">You cannot proceed until you prove you know how to type 15 characters. Create a dummy passphrase below. Make it a sentence or any random combination of words and characters that you will remember.  And don't forget, spaces count as characters too!  String some weird words together or think of a sentence that only you will remember. 'Angry Purple Hippo Battery' or 'Travis in the IT department is an absolute gift to the university' is infinitely better than Newman123! And for the love of all things holy, do not use the word password or your name or your dog's name that's in 27 of your Facebook posts in the past year. We love your dog too, just don't use him as your password.</p>
                        
                        <div class="bg-slate-100 border border-slate-300 rounded shadow-inner p-4 mb-6">
                            <label class="block text-sm font-bold text-slate-700 mb-2">New Password Entry:</label>
                            <input type="text" id="pass-input" oninput="checkPasswordLength()" class="w-full p-3 rounded border border-slate-300 mb-2 font-mono" placeholder="Type at least 15 characters...">
                            <div class="flex justify-between items-center text-xs font-bold">
